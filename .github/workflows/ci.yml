name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    env:
      # Not throwing on a missing key at build time (src/lib/supabase/env.ts
      # defaults to "") is intentional, but a syntactically valid URL keeps
      # @supabase/ssr's client construction happy during the build/prerender.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    env:
      # Deliberately unroutable (not a real Supabase project): every E2E test
      # here avoids requiring a live session, so Supabase calls are expected
      # to fail fast and be handled gracefully by the app, same as this
      # sandbox's own network-blocked-to-Supabase environment during
      # development — see e2e/README or the spec files for what's covered.
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:59999
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
